name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libsqlite3-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build (default features)
        run: cargo build --release --verbose
      - name: Test
        run: cargo test --verbose
      # Real end-to-end test of the Bruker timsdata SDK path (--bruker-sdk) on Linux. Runs ONLY when
      # the runner exposes libtimsdata.so + a sample .d via repo variables (github-hosted runners lack
      # the licensed SDK, so it is skipped there). Set repo variables TIMSDATA_LIB_DIR (dir holding
      # libtimsdata.so) and BRUKER_SDK_SAMPLE_D (a TDF or TSF .d directory).
      - name: Bruker SDK e2e — convert a real TDF/TSF via --bruker-sdk
        if: vars.TIMSDATA_LIB_DIR != '' && vars.BRUKER_SDK_SAMPLE_D != ''
        env:
          TIMSDATA_LIB_DIR: ${{ vars.TIMSDATA_LIB_DIR }}
        run: |
          cargo run --release -- "${{ vars.BRUKER_SDK_SAMPLE_D }}" -o sdk_out.mzpeak --bruker-sdk --force
          test -f sdk_out.mzpeak || { echo "no output produced by --bruker-sdk"; exit 1; }
          echo "Bruker SDK conversion OK: $(stat -c%s sdk_out.mzpeak) bytes"

  # Mine TimsCalibration.ModelType across many PRIDE timsTOF runs (pulls only analysis.tdf via HTTP
  # range requests; no SDK, no binaries) to confirm whether any non-ModelType-2 calibration exists —
  # our scan->1/K0 recalibration is ModelType-2-only. Manual-trigger only.
  tims-modeltype-mine:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python -m pip install --quiet remotezip
      - name: Mine ModelTypes
        run: python tools/mine_modeltypes.py | tee out_log.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tims-modeltypes
          path: |
            out/modeltypes.json
            out_log.txt
