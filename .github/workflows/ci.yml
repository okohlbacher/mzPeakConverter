name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Cross-platform readers (mzML/imzML/Bruker TDF·TSF/Thermo; +BAF·timsdata on Linux) on the two
  # non-Windows OSes. Each job builds that platform's mzpeak-convert executable, runs the tests, and
  # smoke-converts the committed fixture to prove the produced binary works on that OS. Windows + its
  # vendor-SDK glue executables are covered by windows.yml. Matrix mirrors docs/PLATFORM_SUPPORT.md.
  build-test:
    name: build-test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-dotnet@v4        # .NET 8+ runtime for the Thermo .raw reader
        with:
          dotnet-version: '8.0.x'
      - name: Build (default features — BAF/timsdata compile on Linux, excluded on macOS)
        run: cargo build --release --verbose
      - name: Test
        run: cargo test --release --verbose
      - name: Smoke test — convert the committed mzML (verifies the produced executable runs)
        run: |
          ./target/release/mzpeak-convert tests/fixtures/tiny.pwiz.1.1.mzML -o out.mzpeak --force
          test -f out.mzpeak || { echo "no output produced"; exit 1; }
          echo "convert OK on ${{ matrix.os }}: $(wc -c < out.mzpeak) bytes"
      # Real end-to-end test of the Bruker timsdata SDK path (--bruker-sdk) — Linux only (no macOS SDK).
      # Runs ONLY when the runner exposes libtimsdata.so + a sample .d via repo variables (github-hosted
      # runners lack the licensed SDK, so it is skipped there). Set repo variables TIMSDATA_LIB_DIR (dir
      # holding libtimsdata.so) and BRUKER_SDK_SAMPLE_D (a TDF or TSF .d directory).
      - name: Bruker SDK e2e — convert a real TDF/TSF via --bruker-sdk
        if: runner.os == 'Linux' && vars.TIMSDATA_LIB_DIR != '' && vars.BRUKER_SDK_SAMPLE_D != ''
        env:
          TIMSDATA_LIB_DIR: ${{ vars.TIMSDATA_LIB_DIR }}
        run: |
          cargo run --release -- "${{ vars.BRUKER_SDK_SAMPLE_D }}" -o sdk_out.mzpeak --bruker-sdk --force
          test -f sdk_out.mzpeak || { echo "no output produced by --bruker-sdk"; exit 1; }
          echo "Bruker SDK conversion OK: $(stat -c%s sdk_out.mzpeak) bytes"

  # Mine TimsCalibration.ModelType across many PRIDE timsTOF runs (pulls only analysis.tdf via HTTP
  # range requests; no SDK, no binaries) to confirm whether any non-ModelType-2 calibration exists —
  # our scan->1/K0 recalibration is ModelType-2-only. Manual-trigger only.
  tims-modeltype-mine:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python -m pip install --quiet remotezip
      - name: Mine ModelTypes
        run: python tools/mine_modeltypes.py | tee out_log.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tims-modeltypes
          path: |
            out/modeltypes.json
            out_log.txt
