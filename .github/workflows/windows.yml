name: Windows

# Validates the converter on the real Windows target:
#  - `windows` job: builds default + all Windows-only vendor-SDK features
#    (Agilent MHDAC / SciEX Clearcore2 / Bruker BAF FFI), the C# interop glues,
#    runs the tests, and smoke-converts a tiny bundled mzML.
#  - `msconvert` job: installs ProteoWizard and exercises the --via-msconvert lane.
# Runtime conversion of actual Agilent/SciEX/BAF *data* via the native readers
# still needs the proprietary vendor DLLs + vendor data and stays out of CI.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # The default Windows build now compiles the native vendor readers (Agilent MHDAC, SciEX
      # Clearcore2, Bruker BAF) automatically — they're on by default where the platform supports
      # them. SQLite is compiled from source (rusqlite `bundled`); .NET hosting downloads nethost at
      # build. No system deps to install.
      - name: Build (includes native vendor readers)
        run: cargo build --release --verbose

      - name: Test
        run: cargo test --release --verbose

      - name: Build C# interop glues (reflection-only, no vendor DLLs)
        run: |
          dotnet build glue/sciex/SciexGlue.csproj -c Release
          dotnet build glue/agilent/AgilentGlue.csproj -c Release
          dotnet build glue/agilent_midac/AgilentMidacGlue.csproj -c Release

      # Core convert path, end-to-end on Windows, against a tiny committed mzML.
      - name: Smoke test — convert a tiny mzML
        run: cargo run --release -- tests/fixtures/tiny.pwiz.1.1.mzML -o out.mzpeak --force

  # Installs ProteoWizard (msconvert) and exercises the cross-vendor --via-msconvert
  # lane end-to-end on Windows. Uses the committed mzML (msconvert reads mzML and
  # re-emits it → we re-ingest), so the full lane — exe resolution, subprocess,
  # temp mzML handling, re-ingest — is tested without needing licensed vendor data.
  # Separate job so a flaky pwiz install can't mask the core build validation.
  msconvert:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # No Chocolatey/winget package for ProteoWizard, so fetch the portable Windows
      # x86_64 bundle straight from the official TeamCity guestAuth artifact feed,
      # resolving the latest successful build dynamically via the REST API.
      - name: Install ProteoWizard (msconvert) from TeamCity
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $base = "https://teamcity.labkey.org/guestAuth/app/rest"
          $h = @{ Accept = "application/json" }
          $bts = Invoke-RestMethod -Headers $h -Uri "$base/buildTypes?locator=affectedProject:(id:ProteoWizard)"
          $bt = $bts.buildType | Where-Object { $_.name -match "(?i)windows" -and $_.name -match "x86_64" } | Select-Object -First 1
          if (-not $bt) { $bt = $bts.buildType | Where-Object { $_.name -match "(?i)windows" } | Select-Object -First 1 }
          if (-not $bt) { Write-Error "no Windows ProteoWizard build type found"; exit 1 }
          Write-Host "build type: $($bt.id) - $($bt.name)"
          $arts = Invoke-RestMethod -Headers $h -Uri "$base/builds/buildType:$($bt.id),status:SUCCESS,state:finished/artifacts/children"
          $f = $arts.file | Where-Object { $_.name -match "pwiz-bin-windows-x86_64.*\.tar\.bz2$" } | Select-Object -First 1
          if (-not $f) { Write-Error "no pwiz windows x86_64 artifact found"; exit 1 }
          $url = "https://teamcity.labkey.org" + $f.content.href
          Write-Host "downloading $($f.name)"
          Invoke-WebRequest -Uri $url -OutFile pwiz.tar.bz2
          New-Item -ItemType Directory -Force -Path pwiz | Out-Null
          tar -xjf pwiz.tar.bz2 -C pwiz
          $exe = Get-ChildItem -Path pwiz -Recurse -Filter msconvert.exe | Select-Object -First 1
          if (-not $exe) { Write-Error "msconvert.exe not found in artifact"; exit 1 }
          Write-Host "msconvert: $($exe.FullName)"
          "MSCONVERT_PATH=$($exe.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          exit 0

      - name: Build
        run: cargo build --release --verbose

      - name: Convert via msconvert (mzML -> msconvert -> mzPeak)
        shell: pwsh
        run: |
          cargo run --release -- tests/fixtures/tiny.pwiz.1.1.mzML --via-msconvert -o out_pwiz.mzpeak --force
          $code = $LASTEXITCODE
          if ($code -ne 0) { Write-Error "--via-msconvert failed: $code"; exit 1 }
          if (-not (Test-Path out_pwiz.mzpeak)) { Write-Error "no output archive produced"; exit 1 }
          Write-Host "--via-msconvert produced $((Get-Item out_pwiz.mzpeak).Length) bytes"
          exit 0

  # Bruker SDK 1/K0 cross-check on a FREE github-hosted Windows runner. The timsTOF data is in a
  # PUBLIC-READ object store, so it just HTTPS-downloads the two files a TDF conversion needs
  # (analysis.tdf + analysis.tdf_bin) — no credentials. The Bruker timsdata SDK is auto-fetched via
  # the opentims_bruker_bridge pip package (bundles timsdata.dll / libtimsdata.so). Then it converts
  # the SAME .d three ways — SDK (vendor calibration), mzdata (--no-ims-compact), native ims-compact —
  # diffs their 1/K0 mobility axes, and uploads the overlay plot. Each large output is deleted right
  # after its tiny 1/K0 axis is extracted, so it fits the runner's disk. Manual-trigger only.
  #
  # Provide on the repo:
  #   variable BRUKER_SAMPLE_URL = public base URL of the .d (url-encoded), no trailing slash, e.g.
  #     https://object.storage.eu01.onstackit.cloud/v09/.../SBA415%281%29%20Try_Slot1-2_1_8271.d
  # Trigger with: gh workflow run Windows
  bruker-sdk-s3:
    if: github.event_name == 'workflow_dispatch' && vars.BRUKER_SAMPLE_URL != ''
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release --verbose
      - name: Download timsTOF .d (public HTTPS) + fetch SDK
        shell: pwsh
        run: |
          $base = "${{ vars.BRUKER_SAMPLE_URL }}".TrimEnd('/')
          New-Item -ItemType Directory -Force sample.d | Out-Null
          curl.exe -sSL "$base/analysis.tdf"     -o sample.d/analysis.tdf
          curl.exe -sSL "$base/analysis.tdf_bin" -o sample.d/analysis.tdf_bin
          if (-not (Test-Path sample.d/analysis.tdf)) { throw "analysis.tdf download failed" }
          python -m pip install --quiet pyarrow matplotlib opentims_bruker_bridge
          $dll = python -c "import opentims_bruker_bridge as o; print(o.get_appropriate_so_path())"
          "TIMSDATA_LIB_DIR=$(Split-Path $dll)" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "timsdata SDK: $dll"
      - name: Convert three ways, extract 1/K0, delete each large output
        shell: pwsh
        env:
          RUST_BACKTRACE: '1'
          # The comparison tool prints a 'Δ' — force UTF-8 so it doesn't trip Windows' cp1252 stdout.
          PYTHONIOENCODING: 'utf-8'
          # The 1/K0 axis is covered by a handful of frames; cap the conversion so the SDK's raw
          # profile (every TOF bin) stays small + fast and never balloons the runner's RAM/disk.
          MZPC_MAX_SPECTRA: '100'
          MZPC_BUFFER_SPECTRA: '16'
        run: |
          $bin = "target/release/mzpeak-convert.exe"
          # Point layout (no numpress chunking) — fair for a 1/K0 comparison and avoids the
          # numpress allocation blow-up on the SDK's dense profile spectra.
          function conv($flags, $label) {
            & $bin sample.d -o out.mzpeak @flags --layout point --no-vendor --force
            if ($LASTEXITCODE -ne 0) { throw "$label conversion failed ($LASTEXITCODE)" }
            python tools/compare_ion_mobility.py --dump out.mzpeak "$label.json"
            Remove-Item out.mzpeak -Force -ErrorAction SilentlyContinue
          }
          conv @('--bruker-sdk')     'SDK'
          conv @('--no-ims-compact') 'mzdata'
          conv @()                   'ims-compact'
          python tools/compare_ion_mobility.py SDK.json=SDK mzdata.json=mzdata `
            ims-compact.json=ims-compact --plot im_compare.png | Tee-Object im_compare.txt
          # A DIFFER verdict here is the EXPECTED result (SDK's exact nonlinear calibration + raw
          # coverage vs timsrust's linear interpolation), so it's informational — not a CI failure.
          $global:LASTEXITCODE = 0
      # Scan-by-scan calibration: timsrust (linear interpolation) vs the vendor SDK
      # (tims_scannum_to_oneoverk0, exact). Isolates the calibration question from peak coverage.
      - name: Dump scan->1/K0 table (timsrust vs SDK)
        if: always()
        shell: pwsh
        env:
          MZPC_DUMP_IM_TABLE: '1'
        run: |
          target/release/mzpeak-convert.exe sample.d | Out-File -Encoding utf8 im_table.csv
          python -c "import csv; r=list(csv.DictReader(open('im_table.csv'))); d=[abs(float(x['abs_diff'])) for x in r if x['abs_diff']]; print('rows',len(r),'max|timsrust-sdk|',max(d) if d else 'n/a','mean',sum(d)/len(d) if d else 'n/a')"
      - name: Upload ion-mobility comparison
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ion-mobility-comparison
          path: |
            im_compare.png
            im_compare.txt
            im_table.csv
            SDK.json
            mzdata.json
            ims-compact.json

  # Convert the Windows-only vendor datasets (Sciex .wiff, Agilent .d, Waters .raw) of the reference
  # corpus to mzPeak on the runner via the ProteoWizard lane, and TRANSFER THE .mzpeak BACK as a
  # build artifact (plus a raw-vs-mzpeak size table). Pure-Rust/Thermo/Bruker formats are converted
  # on the host (tools/convert_corpus.sh); this job covers only what macOS/Linux can't read.
  #
  # The vendor inputs aren't in git (proprietary + large), so each file is fetched per-URL from a
  # public object store, listed in tools/vendor_ci_manifest.tsv (public bucket listing is denied, so
  # explicit URLs are required). Add rows to the manifest as more datasets get mirrored.
  # Trigger with: gh workflow run Windows
  vendor-corpus:
    if: github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Install ProteoWizard (msconvert) from TeamCity
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $base = "https://teamcity.labkey.org/guestAuth/app/rest"
          $h = @{ Accept = "application/json" }
          $bts = Invoke-RestMethod -Headers $h -Uri "$base/buildTypes?locator=affectedProject:(id:ProteoWizard)"
          $bt = $bts.buildType | Where-Object { $_.name -match "(?i)windows" -and $_.name -match "x86_64" } | Select-Object -First 1
          if (-not $bt) { $bt = $bts.buildType | Where-Object { $_.name -match "(?i)windows" } | Select-Object -First 1 }
          if (-not $bt) { Write-Error "no Windows ProteoWizard build type found"; exit 1 }
          $arts = Invoke-RestMethod -Headers $h -Uri "$base/builds/buildType:$($bt.id),status:SUCCESS,state:finished/artifacts/children"
          $f = $arts.file | Where-Object { $_.name -match "pwiz-bin-windows-x86_64.*\.tar\.bz2$" } | Select-Object -First 1
          if (-not $f) { Write-Error "no pwiz windows x86_64 artifact found"; exit 1 }
          $url = "https://teamcity.labkey.org" + $f.content.href
          Invoke-WebRequest -Uri $url -OutFile pwiz.tar.bz2
          New-Item -ItemType Directory -Force -Path pwiz | Out-Null
          tar -xjf pwiz.tar.bz2 -C pwiz
          $exe = Get-ChildItem -Path pwiz -Recurse -Filter msconvert.exe | Select-Object -First 1
          if (-not $exe) { Write-Error "msconvert.exe not found in artifact"; exit 1 }
          "MSCONVERT_PATH=$($exe.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "$(Split-Path $exe.FullName)" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
      - name: Build
        run: cargo build --release --verbose
      # pyarrow lets the layout step count peaks-facet rows for a bytes/peak figure (best-effort).
      - name: Provision pyarrow (bytes/peak rowcount, best-effort)
        shell: pwsh
        run: python -m pip install --quiet pyarrow || Write-Host "pyarrow unavailable; bytes/peak will be blank"
      - name: Fetch vendor corpus files (per-URL manifest)
        shell: bash
        run: |
          mkdir -p vendor-in
          while IFS=$'\t' read -r dest url flag; do
            # strip any trailing CR (manifest may be checked out with CRLF on Windows) — a stray
            # \r on the URL makes curl reject it ("Malformed input to a URL function").
            dest="${dest%$'\r'}"; url="${url%$'\r'}"; flag="${flag%$'\r'}"
            case "$dest" in ''|\#*) continue ;; esac
            [ -z "$url" ] && continue
            mkdir -p "vendor-in/$(dirname "$dest")"
            echo "downloading $dest"
            curl -sSL "$url" -o "vendor-in/$dest" || { echo "FETCH FAILED: $dest"; exit 1; }
            if [ "${flag:-}" = "unzip" ]; then
              d="vendor-in/$(dirname "$dest")"
              echo "extracting $dest into $d"
              if command -v unzip >/dev/null 2>&1; then unzip -q -o "vendor-in/$dest" -d "$d";
              elif command -v 7z   >/dev/null 2>&1; then 7z x -y -o"$d" "vendor-in/$dest" >/dev/null;
              else tar -xf "vendor-in/$dest" -C "$d"; fi || { echo "UNZIP FAILED: $dest"; exit 1; }
              rm -f "vendor-in/$dest"   # reclaim disk: keep only the extracted vendor dir
            fi
          done < tools/vendor_ci_manifest.tsv
          echo "--- fetched ---"; find vendor-in -maxdepth 3 \( -type f -o -name '*.d' -o -name '*.d - Copy' -o -name 'AcqData' -o -name '*.raw' \) -exec ls -ld {} + | head -50
      - name: Convert vendor datasets -> mzPeak (via msconvert) + capture layouts
        shell: bash
        run: tools/convert_vendor_ci.sh vendor-in vendor-mzpeak-out
      - name: Upload mzPeak archives + size table + layout exploration
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vendor-corpus-mzpeak
          path: |
            vendor-mzpeak-out/archives/**
            vendor-mzpeak-out/results.tsv
            vendor-mzpeak-out/vendor_layouts.md
            vendor-mzpeak-out/vendor_layouts.tsv
            vendor-mzpeak-out/logs/**

  # Extract the ProteoWizard-bundled VENDOR SDK libraries (SCIEX Clearcore2, Agilent MHDAC/MIDAC,
  # Waters MassLynxRaw/cdt, Bruker timsdata/baf2sql, + pwiz CLI bindings) and upload them as an
  # artifact, so they can be mirrored to a PRIVATE store for dissection / the native-reader path.
  # The pwiz bundle is fetched from TeamCity ON THE RUNNER (it is HTTP 403 from some networks).
  # NOTE: these are PROPRIETARY vendor libraries — the mirror MUST stay private. Manual-trigger only.
  pwiz-vendor-extract:
    if: github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ProteoWizard from TeamCity (extracts to pwiz/)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $base = "https://teamcity.labkey.org/guestAuth/app/rest"
          $h = @{ Accept = "application/json" }
          $bts = Invoke-RestMethod -Headers $h -Uri "$base/buildTypes?locator=affectedProject:(id:ProteoWizard)"
          $bt = $bts.buildType | Where-Object { $_.name -match "(?i)windows" -and $_.name -match "x86_64" } | Select-Object -First 1
          if (-not $bt) { $bt = $bts.buildType | Where-Object { $_.name -match "(?i)windows" } | Select-Object -First 1 }
          if (-not $bt) { Write-Error "no Windows ProteoWizard build type found"; exit 1 }
          $arts = Invoke-RestMethod -Headers $h -Uri "$base/builds/buildType:$($bt.id),status:SUCCESS,state:finished/artifacts/children"
          $f = $arts.file | Where-Object { $_.name -match "pwiz-bin-windows-x86_64.*\.tar\.bz2$" } | Select-Object -First 1
          if (-not $f) { Write-Error "no pwiz windows x86_64 artifact found"; exit 1 }
          $url = "https://teamcity.labkey.org" + $f.content.href
          Write-Host "downloading $($f.name)"
          Invoke-WebRequest -Uri $url -OutFile pwiz.tar.bz2
          New-Item -ItemType Directory -Force -Path pwiz | Out-Null
          tar -xjf pwiz.tar.bz2 -C pwiz
          Write-Host "extracted $((Get-ChildItem pwiz -Recurse -File | Measure-Object).Count) files"
      - name: Collect vendor SDK libraries + SHA-256 manifest
        shell: bash
        run: |
          mkdir -p sdk
          # Vendor reader libraries (+ pwiz CLI bindings needed by the native path). Case-insensitive.
          pat='clearcore2|sciex|wiffreader|massspecdatareader|basecommon|basedataaccess|baseerror|baseprocessing|midac|agilent|agt|masslynx|cdt|waters|timsdata|baf2sql|bruker|unifi|pwiz_bindings|pwiz_data'
          find pwiz -type f \( -iname '*.dll' -o -iname '*.so' -o -iname '*.dylib' -o -iname '*.config' \) \
            | grep -iE "$pat" | while read -r f; do
                rel="${f#pwiz/}"; mkdir -p "sdk/$(dirname "$rel")"; cp "$f" "sdk/$rel"
              done
          ( cd sdk && find . -type f ! -name 'MANIFEST*' | sort | while read -r f; do
              printf '%s  %10s  %s\n' "$(sha256sum "$f" | cut -d" " -f1)" "$(stat -c%s "$f")" "${f#./}"
            done ) > sdk/MANIFEST.sha256.txt
          echo "collected $(grep -c . sdk/MANIFEST.sha256.txt) files, total $(du -sh sdk | cut -f1)"
          sed -n '1,60p' sdk/MANIFEST.sha256.txt
      - name: Upload vendor SDK artifact (PRIVATE — proprietary)
        uses: actions/upload-artifact@v4
        with:
          name: pwiz-vendor-sdk
          path: sdk/**
          retention-days: 5

  # Harvest Bruker TDF mobility calibrations across many PRIDE timsTOF runs to reverse-engineer the
  # exact ModelType-2 scan→1/K0 formula. Pulls ONLY analysis.tdf from each remote .d.zip (HTTP range
  # requests), evaluates timsrust vs the vendor SDK per scan, and records C0..C9 + reference points.
  # Manual-trigger only. SDK comes from opentims_bruker_bridge (no licensed download needed).
  tims-cal-harvest:
    if: github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release --verbose
      - name: Provision SDK (opentims_bruker_bridge)
        shell: pwsh
        run: |
          python -m pip install --quiet remotezip opentims_bruker_bridge
          $dll = python -c "import opentims_bruker_bridge as o; print(o.get_appropriate_so_path())"
          "TIMSDATA_LIB_DIR=$(Split-Path $dll)" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "timsdata SDK: $dll"
      - name: Harvest calibrations
        shell: pwsh
        env:
          PYTHONIOENCODING: utf-8
        run: python tools/harvest_calibrations.py target/release/mzpeak-convert.exe
      - name: Upload calibrations
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tims-calibrations
          path: out/calibrations.json
