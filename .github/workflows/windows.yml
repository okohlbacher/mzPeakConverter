name: Windows

# Validates the converter on the real Windows target:
#  - `windows` job: builds default + all Windows-only vendor-SDK features
#    (Agilent MHDAC / SciEX Clearcore2 / Bruker BAF FFI), the C# interop glues,
#    runs the tests, and smoke-converts a tiny bundled mzML.
#  - `msconvert` job: installs ProteoWizard and exercises the --via-msconvert lane.
# Runtime conversion of actual Agilent/SciEX/BAF *data* via the native readers
# still needs the proprietary vendor DLLs + vendor data and stays out of CI.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # The default Windows build now compiles the native vendor readers (Agilent MHDAC, SciEX
      # Clearcore2, Bruker BAF) automatically — they're on by default where the platform supports
      # them. SQLite is compiled from source (rusqlite `bundled`); .NET hosting downloads nethost at
      # build. No system deps to install.
      - name: Build (includes native vendor readers)
        run: cargo build --release --verbose

      - name: Test
        run: cargo test --release --verbose

      - name: Build C# interop glues (reflection-only, no vendor DLLs)
        run: |
          dotnet build glue/sciex/SciexGlue.csproj -c Release
          dotnet build glue/agilent/AgilentGlue.csproj -c Release
          dotnet build glue/agilent_midac/AgilentMidacGlue.csproj -c Release

      # Core convert path, end-to-end on Windows, against a tiny committed mzML.
      - name: Smoke test — convert a tiny mzML
        run: cargo run --release -- tests/fixtures/tiny.pwiz.1.1.mzML -o out.mzpeak --force

  # Installs ProteoWizard (msconvert) and exercises the cross-vendor --via-msconvert
  # lane end-to-end on Windows. Uses the committed mzML (msconvert reads mzML and
  # re-emits it → we re-ingest), so the full lane — exe resolution, subprocess,
  # temp mzML handling, re-ingest — is tested without needing licensed vendor data.
  # Separate job so a flaky pwiz install can't mask the core build validation.
  msconvert:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # No Chocolatey/winget package for ProteoWizard, so fetch the portable Windows
      # x86_64 bundle straight from the official TeamCity guestAuth artifact feed,
      # resolving the latest successful build dynamically via the REST API.
      - name: Install ProteoWizard (msconvert) from TeamCity
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $base = "https://teamcity.labkey.org/guestAuth/app/rest"
          $h = @{ Accept = "application/json" }
          $bts = Invoke-RestMethod -Headers $h -Uri "$base/buildTypes?locator=affectedProject:(id:ProteoWizard)"
          $bt = $bts.buildType | Where-Object { $_.name -match "(?i)windows" -and $_.name -match "x86_64" } | Select-Object -First 1
          if (-not $bt) { $bt = $bts.buildType | Where-Object { $_.name -match "(?i)windows" } | Select-Object -First 1 }
          if (-not $bt) { Write-Error "no Windows ProteoWizard build type found"; exit 1 }
          Write-Host "build type: $($bt.id) - $($bt.name)"
          $arts = Invoke-RestMethod -Headers $h -Uri "$base/builds/buildType:$($bt.id),status:SUCCESS,state:finished/artifacts/children"
          $f = $arts.file | Where-Object { $_.name -match "pwiz-bin-windows-x86_64.*\.tar\.bz2$" } | Select-Object -First 1
          if (-not $f) { Write-Error "no pwiz windows x86_64 artifact found"; exit 1 }
          $url = "https://teamcity.labkey.org" + $f.content.href
          Write-Host "downloading $($f.name)"
          Invoke-WebRequest -Uri $url -OutFile pwiz.tar.bz2
          New-Item -ItemType Directory -Force -Path pwiz | Out-Null
          tar -xjf pwiz.tar.bz2 -C pwiz
          $exe = Get-ChildItem -Path pwiz -Recurse -Filter msconvert.exe | Select-Object -First 1
          if (-not $exe) { Write-Error "msconvert.exe not found in artifact"; exit 1 }
          Write-Host "msconvert: $($exe.FullName)"
          "MSCONVERT_PATH=$($exe.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          exit 0

      - name: Build
        run: cargo build --release --verbose

      - name: Convert via msconvert (mzML -> msconvert -> mzPeak)
        shell: pwsh
        run: |
          cargo run --release -- tests/fixtures/tiny.pwiz.1.1.mzML --via-msconvert -o out_pwiz.mzpeak --force
          $code = $LASTEXITCODE
          if ($code -ne 0) { Write-Error "--via-msconvert failed: $code"; exit 1 }
          if (-not (Test-Path out_pwiz.mzpeak)) { Write-Error "no output archive produced"; exit 1 }
          Write-Host "--via-msconvert produced $((Get-Item out_pwiz.mzpeak).Length) bytes"
          exit 0

  # Bruker SDK 1/K0 cross-check on a FREE github-hosted Windows runner. Pulls the timsTOF .d from the
  # (S3-compatible) object store, auto-downloads the Bruker timsdata SDK via the opentims_bruker_bridge
  # pip package (which bundles timsdata.dll / libtimsdata.so), then converts the SAME .d three ways —
  # SDK (vendor calibration), mzdata (--no-ims-compact), native ims-compact — diffs their 1/K0 mobility
  # axes, and uploads the overlay plot. Each ~5GB output is deleted right after its tiny 1/K0 axis is
  # extracted, so it fits the runner's disk. Manual-trigger only (so it never fires on a normal push).
  #
  # Provide on the repo:
  #   secrets:   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY   (the object-store key id + secret)
  #   variables: BRUKER_SAMPLE_S3 = s3://bucket/prefix/sample.d   (the .d, stored as a prefix)
  #              S3_ENDPOINT      = https://object.storage.eu01.onstackit.cloud   (S3-compatible endpoint)
  #              AWS_REGION       = EU-01
  # Trigger with: gh workflow run Windows
  bruker-sdk-s3:
    if: github.event_name == 'workflow_dispatch' && vars.BRUKER_SAMPLE_S3 != ''
    runs-on: windows-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ vars.AWS_REGION || 'EU-01' }}
      S3_ENDPOINT: ${{ vars.S3_ENDPOINT }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release --verbose
      - name: Pull timsTOF data + fetch SDK
        shell: pwsh
        run: |
          $ep = if ($env:S3_ENDPOINT) { "--endpoint-url", $env:S3_ENDPOINT } else { @() }
          aws s3 cp "${{ vars.BRUKER_SAMPLE_S3 }}" sample.d --recursive --quiet @ep
          if (-not (Test-Path sample.d/analysis.tdf) -and -not (Test-Path sample.d/analysis.tsf)) {
            throw "pulled .d has no analysis.tdf/.tsf — check BRUKER_SAMPLE_S3 points at the .d prefix"
          }
          python -m pip install --quiet pyarrow matplotlib opentims_bruker_bridge
          $dll = python -c "import opentims_bruker_bridge as o; print(o.get_appropriate_so_path())"
          "TIMSDATA_LIB_DIR=$(Split-Path $dll)" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "timsdata SDK: $dll"
      - name: Convert three ways, extract 1/K0, delete each large output
        shell: pwsh
        run: |
          $bin = "target/release/mzpeak-convert.exe"
          function conv($flags, $label) {
            & $bin sample.d -o out.mzpeak @flags --force
            if ($LASTEXITCODE -ne 0) { throw "$label conversion failed ($LASTEXITCODE)" }
            python tools/compare_ion_mobility.py --dump out.mzpeak "$label.json"
            Remove-Item out.mzpeak -Force -ErrorAction SilentlyContinue
          }
          conv @('--bruker-sdk')     'SDK'
          conv @('--no-ims-compact') 'mzdata'
          conv @()                   'ims-compact'
          python tools/compare_ion_mobility.py SDK.json=SDK mzdata.json=mzdata `
            ims-compact.json=ims-compact --plot im_compare.png | Tee-Object im_compare.txt
      - name: Upload ion-mobility comparison
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ion-mobility-comparison
          path: |
            im_compare.png
            im_compare.txt
            SDK.json
            mzdata.json
            ims-compact.json
